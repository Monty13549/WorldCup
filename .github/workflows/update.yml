name: Update World Cup leaderboard

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: leaderboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Scrape Wikipedia
        run: python scripts/scrape.py

      - name: Compute leaderboard
        run: python scripts/score.py

      - name: Commit & push if changed
        run: |
          git config user.name  "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add docs/results.json docs/leaderboard.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update results $(date -u +%FT%TZ)"
            git push
          fi
