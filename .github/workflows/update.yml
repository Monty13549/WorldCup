name: Update World Cup leaderboard

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: leaderboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Scrape Wikipedia
        run: python scripts/scrape.py

      - name: Compute leaderboard
        run: python scripts/score.py

      - name: Commit & push if changed
        run: |
          git config user.name  "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add docs/results.json docs/leaderboard.json docs/history.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update results $(date -u +%FT%TZ)"
          # Retry with rebase if someone else (e.g. a human commit) raced us
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected, pulling and retrying (attempt $attempt)..."
            git pull --rebase --autostash
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
